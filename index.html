<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSF ROSTER // STRIKE COMMAND</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────────────────── */
    :root {
      --bg-void:       #030507;
      --bg-deep:       #070b0f;
      --bg-panel:      #0b1017;
      --bg-card:       #0e1620;
      --bg-hover:      #131e2b;
      --border-dim:    #182030;
      --border-mid:    #1c2e45;
      --border-bright: #0c5280;
      --accent:        #00c8ff;
      --accent-glow:   rgba(0,200,255,0.2);
      --accent-dim:    #006d99;
      --red:           #ff3e3e;
      --red-dim:       #7a1515;
      --gold:          #f0a500;
      --gold-dim:      #6b4800;
      --green:         #00e676;
      --green-dim:     #003d1f;
      --purple:        #b46eff;
      --purple-dim:    #2d0d5e;
      --orange:        #ff7b00;
      --text-primary:  #cce4f0;
      --text-mid:      #6a8fa8;
      --text-dim:      #324d62;
      --font-hud:      'Orbitron', monospace;
      --font-mono:     'Share Tech Mono', monospace;
      --font-body:     'Barlow Condensed', sans-serif;
      /* Role colors */
      --role-blaster:    #ff4e4e;
      --role-brawler:    #ff8c00;
      --role-controller: #a855f7;
      --role-support:    #22d3ee;
      --role-tank:       #4ade80;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,200,255,0.012) 2px, rgba(0,200,255,0.012) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -25%;
      left: 50%;
      transform: translateX(-50%);
      width: 100vw;
      height: 70vh;
      background: radial-gradient(ellipse at center, rgba(0,100,180,0.07) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .hidden { display: none !important; }

    /* ── LOGIN ─────────────────────────────────────────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-void);
      z-index: 100;
    }

    .login-box {
      width: min(460px, 92vw);
      padding: 3rem 2.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      position: relative;
      clip-path: polygon(0 0, calc(100% - 28px) 0, 100% 28px, 100% 100%, 28px 100%, 0 calc(100% - 28px));
    }

    .login-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(0,200,255,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .login-box::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      border-top: 28px solid var(--accent-dim);
      border-left: 28px solid transparent;
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .login-logo svg { filter: drop-shadow(0 0 16px rgba(0,200,255,0.5)); }

    .login-emblem {
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.45em;
      color: var(--accent);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.75rem;
      opacity: 0.7;
    }

    .login-title {
      font-family: var(--font-hud);
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.06em;
      line-height: 1;
      text-align: center;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 40px rgba(0,200,255,0.45);
    }

    .login-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.25em;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      margin-bottom: 2rem;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: linear-gradient(135deg, rgba(0,200,255,0.12), rgba(0,200,255,0.04));
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-hud);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.25s;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      margin-bottom: 0.75rem;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-100%);
      transition: transform 0.25s;
    }

    .btn-primary:hover { color: var(--bg-void); box-shadow: 0 0 24px var(--accent-glow); }
    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary > * { position: relative; z-index: 1; }

    .btn-secondary {
      display: block;
      width: 100%;
      padding: 0.7rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .btn-secondary:hover { border-color: var(--text-mid); color: var(--text-primary); }

    .login-note {
      margin-top: 1.5rem;
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.7;
      text-align: center;
    }

    /* ── MAIN APP ──────────────────────────────────────────────────────────── */
    #main-app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── TOP BAR ───────────────────────────────────────────────────────────── */
    #top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 1.25rem;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-dim);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    #top-bar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--accent-dim) 30%, var(--accent-dim) 70%, transparent 100%);
      opacity: 0.5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 32px; height: 32px;
      filter: drop-shadow(0 0 8px rgba(0,200,255,0.6));
    }

    .brand-text { line-height: 1; }

    .brand-name {
      font-family: var(--font-hud);
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.08em;
    }

    .brand-sub {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.25em;
    }

    #metrics {
      display: flex;
      gap: 4px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #metrics::-webkit-scrollbar { display: none; }

    .metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.25rem 0.65rem;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      min-width: 64px;
      flex-shrink: 0;
      clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 5px 100%, 0 calc(100% - 5px));
    }

    .metric-label {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .metric-val {
      font-family: var(--font-hud);
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.2;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .status-badge {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.55rem;
      border: 1px solid var(--border-mid);
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .status-badge.live { border-color: var(--green); color: var(--green); box-shadow: 0 0 8px rgba(0,230,118,0.2); }
    .status-badge.loading { border-color: var(--gold); color: var(--gold); animation: blink 1s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .top-btn {
      padding: 0.3rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .top-btn:hover { border-color: var(--accent); color: var(--accent); }
    .top-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* ── TAB BAR ───────────────────────────────────────────────────────────── */
    #tab-bar {
      display: flex;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-dim);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.6rem 1.1rem;
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      border: none;
      background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text-mid); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── PANELS ────────────────────────────────────────────────────────────── */
    .panel { padding: 1.1rem 1.25rem; flex: 1; }

    /* ── SECTION HEADERS ───────────────────────────────────────────────────── */
    .section-header {
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 0.4rem 0;
      margin-bottom: 0.9rem;
      border-bottom: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .section-header::before {
      content: '';
      display: block;
      width: 3px;
      height: 12px;
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      box-shadow: 0 0 6px var(--accent-glow);
    }

    /* ── FILTER ROW ────────────────────────────────────────────────────────── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .filter-row input,
    .filter-row select {
      padding: 0.4rem 0.7rem;
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 11px;
      outline: none;
      transition: border-color 0.15s;
      min-width: 110px;
    }

    .filter-row input:focus,
    .filter-row select:focus { border-color: var(--accent-dim); }
    .filter-row input::placeholder { color: var(--text-dim); }
    .filter-row select option { background: var(--bg-panel); }

    /* ── ROSTER GRID ───────────────────────────────────────────────────────── */
    #roster {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 0.65rem;
    }

    /* ── CHARACTER CARD (portrait style) ──────────────────────────────────── */
    .char-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
      animation: fadeUp 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .char-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      border-top: 14px solid var(--border-bright);
      border-left: 14px solid transparent;
      transition: border-top-color 0.18s;
    }

    .char-card:hover {
      border-color: var(--accent-dim);
      background: var(--bg-hover);
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,200,255,0.1);
    }

    .char-card:hover::after { border-top-color: var(--accent); }

    /* Portrait section */
    .char-portrait {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--bg-deep);
    }

    .char-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      transition: transform 0.3s ease;
    }

    .char-card:hover .char-portrait img { transform: scale(1.06); }

    /* SVG fallback avatar */
    .char-avatar-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-hud);
      font-size: 2rem;
      font-weight: 900;
    }

    /* Gradient overlay on portrait */
    .char-portrait-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, var(--bg-card) 0%, rgba(14,22,32,0.6) 60%, transparent 100%);
    }

    /* Tier badge on portrait */
    .char-portrait .tier-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      padding: 2px 5px;
      border: 1px solid;
      backdrop-filter: blur(4px);
      letter-spacing: 0.06em;
    }

    /* Stars on portrait */
    .char-stars {
      position: absolute;
      bottom: 6px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 1px;
      font-size: 9px;
      letter-spacing: 0;
    }

    .char-star { opacity: 0.3; }
    .char-star.filled { opacity: 1; color: var(--gold); }
    .char-star.red { opacity: 1; color: var(--red); }

    /* Card body below portrait */
    .char-body {
      padding: 0.6rem 0.75rem 0.75rem;
    }

    .char-name {
      font-family: var(--font-hud);
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .char-role-teams {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
      min-height: 14px;
    }

    .char-role-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .char-role-text {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .char-stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      margin-bottom: 6px;
    }

    .char-stat {
      background: var(--bg-deep);
      padding: 3px 5px;
    }

    .char-stat-label {
      font-family: var(--font-mono);
      font-size: 8px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .char-stat-val {
      font-family: var(--font-hud);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }

    /* Shard progress bar on card */
    .char-shard-row {
      margin-top: 4px;
    }

    .char-shard-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .char-shard-label span:last-child { color: var(--gold); }

    .shard-bar-bg {
      height: 3px;
      background: var(--border-dim);
      position: relative;
    }

    .shard-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      box-shadow: 0 0 4px rgba(240,165,0,0.4);
      transition: width 0.5s ease;
    }

    /* Power bar */
    .power-bar-bg {
      height: 2px;
      background: var(--border-dim);
      margin-top: 6px;
    }

    .power-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      box-shadow: 0 0 5px var(--accent-glow);
      transition: width 0.5s ease;
    }

    /* Tier colors */
    .tier-badge { display: inline-block; }
    .tier-T13 { color: var(--accent); border-color: var(--accent); background: rgba(0,200,255,0.12); }
    .tier-T12 { color: var(--green); border-color: var(--green); background: rgba(0,230,118,0.12); }
    .tier-T11 { color: var(--gold); border-color: var(--gold); background: rgba(240,165,0,0.12); }
    .tier-T10 { color: var(--purple); border-color: var(--purple); background: rgba(180,110,255,0.12); }
    .tier-low { color: var(--text-mid); border-color: var(--border-mid); background: rgba(106,143,168,0.08); }

    /* Role colors */
    .role-Blaster    { background: var(--role-blaster); }
    .role-Brawler    { background: var(--role-brawler); }
    .role-Controller { background: var(--role-controller); }
    .role-Support    { background: var(--role-support); }
    .role-Tank       { background: var(--role-tank); }

    /* ── SQUADS ────────────────────────────────────────────────────────────── */
    #squads {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.75rem;
    }

    .squad-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      padding: 1rem 1.1rem 0.85rem;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
      animation: fadeUp 0.2s ease both;
      transition: border-color 0.15s;
    }

    .squad-card:hover { border-color: var(--border-bright); }

    .squad-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      border-top: 14px solid var(--accent-dim);
      border-left: 14px solid transparent;
    }

    /* Header: team name + type badge */
    .squad-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.85rem;
    }

    .squad-team-name {
      font-family: var(--font-hud);
      font-size: 16px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.03em;
      line-height: 1.1;
    }

    .squad-name {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .squad-type-badge {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 2px 7px;
      border: 1px solid;
      white-space: nowrap;
    }

    /* Role pips row */
    .squad-role-pips {
      display: flex;
      gap: 3px;
      justify-content: flex-end;
    }

    .squad-role-pip {
      width: 18px; height: 18px;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 900;
      color: #000;
      opacity: 0.9;
    }

    /* Portrait icons row */
    .squad-icons-row {
      display: flex;
      gap: 8px;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .squad-icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: default;
    }

    .squad-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--role-color, var(--border-bright));
      overflow: hidden;
      background: var(--bg-deep);
      box-shadow: 0 0 8px color-mix(in srgb, var(--role-color, var(--accent)) 30%, transparent);
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .squad-icon-wrap:hover .squad-icon {
      transform: scale(1.12);
      box-shadow: 0 0 14px color-mix(in srgb, var(--role-color, var(--accent)) 50%, transparent);
    }

    .squad-icon-fallback {
      display: flex;
    }

    .squad-icon-tier {
      font-family: var(--font-hud);
      font-size: 8px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .squad-icon-name {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      max-width: 52px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    /* Synergy badges */
    .squad-synergies {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 0.7rem;
      padding-top: 0.65rem;
      border-top: 1px solid var(--border-dim);
    }

    .synergy-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 7px;
      border: 1px solid;
      border-radius: 2px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .synergy-count {
      opacity: 0.65;
      font-size: 9px;
    }

    /* Footer total */
    .squad-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border-dim);
      padding-top: 0.45rem;
    }

    .squad-footer-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .squad-footer-val {
      font-family: var(--font-hud);
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── AI CHAT ───────────────────────────────────────────────────────────── */
    #panel-ai {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 115px);
      padding: 0;
    }

    .ai-header { padding: 0.9rem 1.25rem 0.7rem; border-bottom: 1px solid var(--border-dim); }

    .ai-prompt-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid var(--border-dim);
    }

    .ai-prompt-btn {
      padding: 0.25rem 0.65rem;
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      font-family: var(--font-mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .ai-prompt-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ai-prompt-btn.danger:hover { border-color: var(--red); color: var(--red); }

    #ai-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }

    .ai-msg { display: flex; }
    .ai-msg.user { justify-content: flex-end; }

    .ai-msg-bubble {
      max-width: 76%;
      padding: 0.65rem 1rem;
      font-size: 14px;
      line-height: 1.6;
    }

    .ai-msg.user .ai-msg-bubble {
      background: rgba(0,200,255,0.1);
      border: 1px solid var(--accent-dim);
      color: var(--text-primary);
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    }

    .ai-msg.assistant .ai-msg-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      color: var(--text-primary);
      clip-path: polygon(0 8px, 8px 0, 100% 0, 100% 100%, 0 100%);
    }

    .ai-msg.loading .ai-msg-bubble {
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      animation: blink 1.2s infinite;
    }

    /* ── AI message markdown styles ─────────────────────────────────────────── */
    .ai-msg-bubble .ai-h2 {
      font-family: var(--font-hud);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0.75rem 0 0.35rem;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border-dim);
    }

    .ai-msg-bubble .ai-h2:first-child { margin-top: 0; }

    .ai-msg-bubble .ai-h3 {
      font-family: var(--font-hud);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-primary);
      margin: 0.6rem 0 0.25rem;
    }

    .ai-msg-bubble .ai-p {
      margin: 0 0 0.4rem;
      line-height: 1.65;
      font-size: 14px;
    }

    .ai-msg-bubble .ai-p:last-child { margin-bottom: 0; }

    .ai-msg-bubble .ai-bold-line {
      font-weight: 600;
      color: var(--text-primary);
      margin: 0.5rem 0 0.2rem;
      font-size: 13px;
    }

    .ai-msg-bubble .ai-ul,
    .ai-msg-bubble .ai-ol {
      margin: 0.3rem 0 0.5rem 0;
      padding-left: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .ai-msg-bubble .ai-ul li {
      padding-left: 1rem;
      position: relative;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-primary);
    }

    .ai-msg-bubble .ai-ul li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 10px;
      top: 3px;
    }

    .ai-msg-bubble .ai-ol {
      counter-reset: ai-ol;
    }

    .ai-msg-bubble .ai-ol li {
      padding-left: 1.4rem;
      position: relative;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-primary);
      counter-increment: ai-ol;
    }

    .ai-msg-bubble .ai-ol li::before {
      content: counter(ai-ol);
      position: absolute;
      left: 0;
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(0,200,255,0.1);
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      top: 1px;
    }

    .ai-msg-bubble code {
      font-family: var(--font-mono);
      font-size: 12px;
      background: rgba(0,200,255,0.08);
      border: 1px solid var(--border-mid);
      padding: 1px 5px;
      color: var(--accent);
    }

    .ai-msg-bubble .ai-hr {
      border: none;
      border-top: 1px solid var(--border-dim);
      margin: 0.6rem 0;
    }

    .ai-msg-bubble .ai-spacer {
      height: 0.4rem;
    }

    /* Inline tier badges inside AI responses */
    .ai-msg-bubble .ai-tier-badge {
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      background: rgba(0,200,255,0.08);
      vertical-align: middle;
    }

    /* Power values */
    .ai-msg-bubble .ai-power-val {
      font-family: var(--font-mono);
      color: var(--gold);
      font-size: 13px;
    }

    .ai-msg-bubble strong {
      color: #fff;
      font-weight: 700;
    }

    .ai-msg-bubble em {
      color: var(--text-mid);
      font-style: italic;
    }

    .ai-input-row {
      display: flex;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem;
      border-top: 1px solid var(--border-dim);
    }

    #ai-input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    #ai-input:focus { border-color: var(--accent-dim); }

    #ai-send-btn {
      padding: 0.6rem 1.1rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 0 100%);
    }

    #ai-send-btn:hover { background: var(--accent); color: var(--bg-void); }

    /* ── COMMANDER PAGE ────────────────────────────────────────────────────── */
    .cmd-page {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Hero banner */
    .cmd-hero {
      position: relative;
      overflow: hidden;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border-dim);
      margin: -1.1rem -1.25rem 0;
    }

    .cmd-hero-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .cmd-hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--bg-deep) 30%, rgba(7,11,15,0.4) 100%);
    }

    .cmd-hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 1.5rem;
    }

    .cmd-avatar-ring {
      flex-shrink: 0;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, var(--accent-dim) 120deg, var(--border-bright) 240deg, var(--accent) 360deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px var(--accent-glow), 0 0 60px rgba(0,200,255,0.1);
      animation: spin-ring 8s linear infinite;
    }

    @keyframes spin-ring {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .cmd-avatar {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: var(--bg-void);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-hud);
      font-size: 26px;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
      animation: spin-ring 8s linear infinite reverse; /* counter-rotate so text stays upright */
    }

    .cmd-commander-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 4px;
    }

    .cmd-commander-name {
      font-family: var(--font-hud);
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      margin-bottom: 10px;
    }

    .cmd-commander-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cmd-meta-pill {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      background: rgba(11,16,23,0.7);
    }

    .cmd-meta-alliance {
      border-color: var(--gold-dim);
      color: var(--gold);
    }

    /* Stats row */
    .cmd-stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 1rem 0 0.75rem;
      border-bottom: 1px solid var(--border-dim);
      margin-bottom: 0.1rem;
    }

    .cmd-stat {
      flex: 1;
      min-width: 90px;
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      padding: 0.55rem 0.75rem;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 0 100%);
    }

    .cmd-stat-label {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .cmd-stat-val {
      font-family: var(--font-hud);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.1;
    }

    /* Sections */
    .cmd-section {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border-dim);
    }

    .cmd-section:last-child { border-bottom: none; }

    .cmd-section-label {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cmd-section-label::before {
      content: '';
      display: block;
      width: 3px;
      height: 11px;
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
    }

    /* Tier distribution bar */
    .cmd-tier-bar {
      display: flex;
      height: 10px;
      border-radius: 2px;
      overflow: hidden;
      gap: 2px;
      margin-bottom: 8px;
    }

    .tier-bar-seg {
      height: 100%;
      transition: width 0.6s ease;
      min-width: 3px;
    }

    .cmd-tier-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tier-legend-item {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tier-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Top 5 characters */
    .cmd-top5-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .cmd-top5-row::-webkit-scrollbar { display: none; }

    .cmd-top-char {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      width: 80px;
    }

    .cmd-top-char--hero { width: 100px; }

    .cmd-top-rank {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .cmd-top-char--hero .cmd-top-rank { color: var(--gold); }

    .cmd-top-port {
      position: relative;
      overflow: hidden;
      border-radius: 6px;
      border: 2px solid var(--border-bright);
      background: var(--bg-deep);
      width: 72px;
      height: 72px;
    }

    .cmd-top-char--hero .cmd-top-port {
      width: 90px;
      height: 90px;
      border-radius: 8px;
    }

    .cmd-top-name {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .cmd-top-power {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
    }

    .cmd-top-tier { margin-top: -2px; }

    /* Best squad */
    .cmd-squad-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .cmd-squad-row::-webkit-scrollbar { display: none; }

    .cmd-squad-member {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      width: 72px;
    }

    .cmd-squad-icon {
      position: relative;
      overflow: hidden;
      width: 64px;
      height: 64px;
      border-radius: 8px;
      border: 2px solid var(--border-bright);
      background: var(--bg-deep);
    }

    .cmd-squad-name {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .cmd-squad-power {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--accent);
    }

    /* Alliance */
    .cmd-alliance-name {
      font-family: var(--font-hud);
      font-size: 18px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .cmd-alliance-desc {
      font-size: 12px;
      color: var(--text-mid);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .cmd-alliance-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .cmd-alliance-stats .cmd-stat {
      min-width: 80px;
    }

    /* Role composition */
    .cmd-role-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cmd-role-item {
      display: grid;
      grid-template-columns: 90px 1fr 30px;
      align-items: center;
      gap: 8px;
    }

    .cmd-role-label {
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .cmd-role-bar-bg {
      height: 6px;
      background: var(--border-dim);
      border-radius: 3px;
      overflow: hidden;
    }

    .cmd-role-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
      box-shadow: 0 0 6px currentColor;
    }

    .cmd-role-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
    }

    /* ── ACTIVITIES ────────────────────────────────────────────────────────── */
    .activities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 0.65rem;
      margin-bottom: 1rem;
    }

    .event-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dim);
      overflow: hidden;
      transition: border-color 0.15s;
      position: relative;
      cursor: pointer;
      animation: fadeUp 0.2s ease both;
    }

    .event-card:hover { border-color: var(--border-bright); }

    /* Activity image banner */
    .event-image {
      width: 100%;
      height: 80px;
      object-fit: cover;
      object-position: center top;
      display: block;
      background: var(--bg-deep);
    }

    .event-image-placeholder {
      width: 100%;
      height: 80px;
      background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-panel) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: 0.4;
    }

    .event-card-body { padding: 0.75rem; }

    .event-type-badge {
      display: inline-block;
      font-family: var(--font-hud);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 2px 6px;
      margin-bottom: 5px;
    }

    .event-name { font-family: var(--font-hud); font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .event-subname { font-size: 11px; color: var(--text-mid); margin-bottom: 4px; }

    .activity-expand {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-dim);
    }

    .activity-tier-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 9px;
      padding: 2px 5px;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      margin-right: 3px;
    }

    .gm-squad-title {
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .activity-modal-squad { display: flex; flex-direction: column; gap: 3px; }

    .activity-squad-member {
      display: flex;
      justify-content: space-between;
      padding: 3px 7px;
      background: var(--bg-deep);
      border-left: 2px solid var(--accent-dim);
    }

    .activity-squad-name { font-size: 13px; color: var(--text-primary); }
    .activity-squad-power { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }

    /* ── INVENTORY ─────────────────────────────────────────────────────────── */
    .inv-panel {
      background: #070a14;
      min-height: calc(100vh - 115px);
      padding: 1.1rem 1.25rem;
    }

    /* Toolbar */
    .inv-toolbar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .inv-search-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.4rem 0.75rem;
      flex: 1;
      min-width: 160px;
      max-width: 280px;
    }

    .inv-search-icon { color: var(--text-dim); font-size: 15px; }

    .inv-search {
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 13px;
      font-family: var(--font-body);
      width: 100%;
    }

    .inv-search::placeholder { color: rgba(255,255,255,0.25); }

    .inv-filter-select {
      padding: 0.4rem 0.7rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .inv-filter-select option { background: #0e1620; }

    /* Category tabs */
    .inv-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border-dim);
    }

    .inv-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-dim);
      font-family: var(--font-hud);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .inv-tab:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .inv-tab--active { background: rgba(255,255,255,0.08); }

    .inv-tab-count {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.08);
      padding: 1px 4px;
    }

    .inv-tab-low {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--red);
    }

    /* Grid */
    .inv-msf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .inv-empty {
      color: var(--text-dim);
      font-size: 13px;
      padding: 2rem;
      font-family: var(--font-mono);
      text-align: center;
    }

    /* Tile */
    .inv-tile {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #0c1022;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 10px 8px 8px;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      user-select: none;
    }

    .inv-tile:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.18); }
    .inv-tile--low { border-color: rgba(255,62,62,0.3) !important; background: #150c0c; }

    .inv-tile-low-flag {
      position: absolute;
      top: 5px; right: 6px;
      font-size: 10px;
    }

    /* Gold italic name */
    .inv-tile-name {
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 700;
      font-size: 11px;
      text-align: center;
      line-height: 1.3;
      margin-bottom: 8px;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* MSF-style frame */
    .inv-tile-frame {
      width: 90px;
      height: 90px;
      border: 3px solid;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 7px;
      flex-shrink: 0;
      position: relative;
    }

    /* Corner rivets */
    .inv-tile-frame::before,
    .inv-tile-frame::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }

    .inv-tile-frame::before { top: 3px; left: 3px; box-shadow: 72px 0 0 currentColor, 0 72px 0 currentColor, 72px 72px 0 currentColor; }

    .inv-tile-img {
      width: 72px; height: 72px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.8));
    }

    .inv-tile-img-bg {
      width: 72px;
      height: 72px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.8));
    }

    .inv-tile-img-fb {
      width: 72px; height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    /* Solid colour block fallback when no icon — visually differentiates by category */
    .inv-tile-color-block {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      opacity: 0.35;
    }

    /* Tab dot indicator */
    .inv-tab-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }

    .inv-popup-icon-swatch,
    .inv-popup-swatch {
      width: 48px; height: 48px;
      border: 1px solid;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .inv-tile-own {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      text-align: center;
    }

    .inv-tile-qty { color: #fff; font-weight: 700; }
    .inv-tile-qty--low { color: var(--red) !important; }

    /* Popup */
    .inv-popup {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      background: #0a0f1e;
      border: 1px solid;
      box-shadow: 0 8px 30px rgba(0,0,0,0.9);
      padding: 0.8rem;
      z-index: 300;
      text-align: left;
    }

    .inv-popup::after {
      content: '';
      position: absolute;
      bottom: -7px; left: 50%;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid rgba(255,255,255,0.12);
    }

    .inv-tile--open .inv-popup { display: block; }

    .inv-popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .inv-popup-icon {
      width: 40px; height: 40px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .inv-popup-icon-fb {
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .inv-popup-name {
      font-family: var(--font-hud);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 2px;
    }

    .inv-popup-qty {
      font-family: var(--font-mono);
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .inv-popup-qty--low { color: var(--red); }

    .inv-popup-desc {
      font-size: 11px;
      color: var(--text-mid);
      line-height: 1.5;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .inv-popup-label {
      font-family: var(--font-hud);
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .inv-popup-locs { display: flex; flex-direction: column; gap: 2px; }

    .inv-popup-loc {
      font-size: 11px;
      color: var(--text-primary);
      padding: 2px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }

    .inv-popup-loc:last-child { border-bottom: none; }

    .inv-popup-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    /* ── MODALS ────────────────────────────────────────────────────────────── */
    #char-modal,
    #activity-modal {
      position: fixed;
      inset: 0;
      background: rgba(3,5,7,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
      backdrop-filter: blur(6px);
    }

    .modal-box {
      width: min(560px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      position: relative;
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }

    .modal-box::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      border-top: 20px solid var(--accent);
      border-left: 20px solid transparent;
    }

    /* Modal portrait header */
    .modal-portrait-header {
      position: relative;
      height: 180px;
      overflow: hidden;
      background: var(--bg-deep);
    }

    .modal-portrait-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .modal-portrait-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-hud);
      font-size: 4rem;
      font-weight: 900;
      opacity: 0.15;
    }

    .modal-portrait-gradient {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70%;
      background: linear-gradient(to top, var(--bg-panel) 0%, transparent 100%);
    }

    .modal-portrait-info {
      position: absolute;
      bottom: 1rem;
      left: 1.5rem;
      right: 1.5rem;
    }

    .modal-close-btn {
      position: absolute;
      top: 0.75rem; right: 1.5rem;
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-dim);
      font-family: var(--font-hud);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 3px 8px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.15s;
    }

    .modal-close-btn:hover { border-color: var(--red); color: var(--red); }

    .modal-body { padding: 0 1.5rem 1.5rem; }

    .modal-title {
      font-family: var(--font-hud);
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 0.3rem;
      text-shadow: 0 2px 12px rgba(0,0,0,0.8);
    }

    .modal-section-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 5px;
      margin-top: 1rem;
    }

    .modal-badge {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px;
      font-family: var(--font-mono);
      font-size: 10px;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
    }

    .modal-badge.role { border-color: var(--accent-dim); color: var(--accent); }

    .modal-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      margin-top: 5px;
    }

    .modal-stat {
      background: var(--bg-deep);
      border: 1px solid var(--border-dim);
      padding: 0.45rem;
      clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 5px, 100% 100%, 0 100%);
    }

    .modal-stat-label { font-family: var(--font-mono); font-size: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
    .modal-stat-val { font-family: var(--font-hud); font-size: 15px; font-weight: 700; color: var(--accent); }

    .modal-shard-bar { height: 4px; background: var(--border-dim); margin-top: 5px; }
    .modal-shard-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }

    .modal-gear-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 5px;
      margin-top: 5px;
    }

    .modal-gear-piece {
      background: var(--bg-deep);
      padding: 0.45rem;
      text-align: center;
    }

    .modal-gear-icon { width: 38px; height: 38px; object-fit: contain; margin-bottom: 3px; }
    .modal-gear-name { font-size: 9px; color: var(--text-mid); margin-bottom: 2px; }
    .modal-gear-level { font-family: var(--font-mono); font-size: 9px; }

    /* Activity modal */
    #act-modal-tiers { margin-top: 5px; }
    #act-modal-squad { margin-top: 7px; }

    /* ── EMPTY STATE ───────────────────────────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      border: 1px dashed var(--border-dim);
    }

    /* ── SCROLLBAR ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); }

    /* ── RESPONSIVE ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #top-bar { flex-wrap: wrap; gap: 0.4rem; }
      #metrics { order: 3; width: 100%; }
      .modal-stats { grid-template-columns: repeat(2, 1fr); }
      .panel { padding: 0.75rem; }
      #roster { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="30,2 58,16 58,44 30,58 2,44 2,16" fill="none" stroke="#00c8ff" stroke-width="1.5" opacity="0.4"/>
        <polygon points="30,8 52,20 52,40 30,52 8,40 8,20" fill="none" stroke="#00c8ff" stroke-width="1" opacity="0.6"/>
        <text x="30" y="36" text-anchor="middle" font-family="Orbitron,monospace" font-size="16" font-weight="900" fill="#00c8ff">MSF</text>
      </svg>
    </div>
    <div class="login-emblem">Strike Command // Intel System</div>
    <div class="login-title">ROSTER<br>COMMAND</div>
    <div class="login-sub">TACTICAL INTELLIGENCE v2.1</div>
    <div class="login-divider"></div>
    <button id="signin-btn" class="btn-primary">
      <span>⬡</span><span>Authorize with MSF Account</span>
    </button>
    <button id="demo-btn" class="btn-secondary">Enter Demo Mode</button>
    <div class="login-note">
      Your data stays on your device.<br>No accounts or external storage.
    </div>
  </div>
</div>

<!-- ── MAIN APP ───────────────────────────────────────────────────────────── -->
<div id="main-app" class="hidden">

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="16,1 31,8.5 31,23.5 16,31 1,23.5 1,8.5" fill="none" stroke="#00c8ff" stroke-width="1.2" opacity="0.5"/>
        <polygon points="16,5 27,11 27,21 16,27 5,21 5,11" fill="none" stroke="#00c8ff" stroke-width="0.8" opacity="0.7"/>
        <text x="16" y="20" text-anchor="middle" font-family="Orbitron,monospace" font-size="9" font-weight="900" fill="#00c8ff">MSF</text>
      </svg>
      <div class="brand-text">
        <div class="brand-name">STRIKE CMD</div>
        <div class="brand-sub">ROSTER INTEL</div>
      </div>
    </div>
    <div id="metrics"></div>
    <div class="top-bar-right">
      <span id="mode-badge" class="status-badge">Demo</span>
      <button id="refresh-btn" class="top-btn hidden">⟳ Sync</button>
      <button id="logout-btn" class="top-btn danger hidden">Logout</button>
    </div>
  </div>

  <!-- Tab Bar -->
  <div id="tab-bar">
    <button id="tab-roster"     class="tab active">◈ Roster</button>
    <button id="tab-squads"     class="tab">◉ Squads</button>
    <button id="tab-ai"         class="tab">⬡ AI Advisor</button>
    <button id="tab-card"       class="tab">▣ Commander</button>
    <button id="tab-activities" class="tab">◆ Activities</button>
    <button id="tab-inventory"  class="tab">◧ Inventory</button>
  </div>

  <!-- Roster Panel -->
  <div id="panel-roster" class="panel">
    <div class="filter-row">
      <input type="text" id="search" placeholder="Search characters..." style="flex:1;min-width:150px" />
      <select id="filter-tier">
        <option value="">All tiers</option>
        <option value="T13">T13</option>
        <option value="T12">T12</option>
        <option value="T11">T11</option>
        <option value="T10">T10</option>
        <option value="low">Below T10</option>
      </select>
      <select id="filter-role">
        <option value="">All roles</option>
        <option>Blaster</option><option>Brawler</option>
        <option>Controller</option><option>Support</option><option>Tank</option>
      </select>
      <select id="filter-team"><option value="">All teams</option></select>
      <select id="sort-by">
        <option value="power">Power ↓</option>
        <option value="tier">Tier ↓</option>
        <option value="name">Name A-Z</option>
      </select>
    </div>
    <div id="roster"></div>
  </div>

  <!-- Squads Panel -->
  <div id="panel-squads" class="panel hidden">
    <div class="section-header">Saved Squads</div>
    <div id="squads"></div>
  </div>

  <!-- AI Panel -->
  <div id="panel-ai" class="hidden">
    <div class="ai-header">
      <div class="section-header" style="margin-bottom:0;border:none;padding:0">AI Advisor — SuperZero</div>
    </div>
    <div class="ai-prompt-row">
      <button id="ai-btn-raids"   class="ai-prompt-btn">Raid lineup?</button>
      <button id="ai-btn-teams"   class="ai-prompt-btn">Strongest teams?</button>
      <button id="ai-btn-upgrade" class="ai-prompt-btn">Who to upgrade?</button>
      <button id="ai-btn-squads"  class="ai-prompt-btn">Review squads</button>
      <button id="ai-btn-clear"   class="ai-prompt-btn danger">Clear chat</button>
    </div>
    <div id="ai-messages"></div>
    <div class="ai-input-row">
      <input id="ai-input" type="text" placeholder="Ask about your roster, teams, strategy..." />
      <button id="ai-send-btn">SEND ▶</button>
    </div>
  </div>

  <!-- Player Card Panel -->
  <div id="panel-card" class="panel hidden">
    <div class="section-header">Commander Profile</div>
    <div id="player-card"></div>
  </div>

  <!-- Activities Panel -->
  <div id="panel-activities" class="panel hidden">
    <div id="activities-content"></div>
  </div>

  <!-- Inventory Panel -->
  <div id="panel-inventory" class="panel inv-panel hidden">
    <div id="inventory-content"></div>
  </div>

</div>

<!-- ── CHARACTER MODAL ────────────────────────────────────────────────────── -->
<div id="char-modal" class="hidden">
  <div class="modal-box">
    <button id="char-modal-close-btn" class="modal-close-btn">✕ CLOSE</button>
    <!-- Portrait header rendered by JS -->
    <div id="modal-portrait-header" class="modal-portrait-header">
      <div class="modal-portrait-fallback" id="modal-portrait-fallback"></div>
      <div class="modal-portrait-gradient"></div>
      <div class="modal-portrait-info">
        <div id="modal-name" class="modal-title"></div>
        <div id="modal-tier-badge"></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section-label">Roles</div>
      <div id="modal-roles"></div>
      <div class="modal-section-label">Teams</div>
      <div id="modal-teams"></div>
      <div class="modal-section-label">Stats</div>
      <div id="modal-stats" class="modal-stats"></div>
      <div class="modal-section-label">Shards</div>
      <div id="modal-shards"></div>
      <div class="modal-section-label">Next Gear Tier</div>
      <div id="modal-gear"></div>
    </div>
  </div>
</div>

<!-- ── ACTIVITY MODAL ─────────────────────────────────────────────────────── -->
<div id="activity-modal" class="hidden">
  <div class="modal-box">
    <button id="activity-modal-close-btn" class="modal-close-btn">✕ CLOSE</button>
    <div id="act-modal-portrait" class="modal-portrait-header" style="height:120px">
      <div class="modal-portrait-fallback" style="font-size:2.5rem" id="act-modal-icon">◆</div>
      <div class="modal-portrait-gradient"></div>
      <div class="modal-portrait-info">
        <div id="act-modal-title" class="modal-title" style="font-size:17px"></div>
        <div id="act-modal-sub" style="font-family:var(--font-mono);font-size:11px;color:var(--text-mid)"></div>
      </div>
    </div>
    <div class="modal-body">
      <div id="act-modal-details" style="font-size:13px;color:var(--text-mid);line-height:1.6;margin-bottom:0.75rem;white-space:pre-line"></div>
      <div id="act-modal-tiers-section">
        <div class="modal-section-label">Difficulty Tiers</div>
        <div id="act-modal-tiers"></div>
      </div>
      <div class="modal-section-label">Recommended Squad</div>
      <div id="act-modal-squad"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
