<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting — MSF Roster Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e5;
      border-radius: 14px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .icon.spinning {
      background: #e6f1fb;
    }

    .icon.success {
      background: #eaf3de;
    }

    .icon.error {
      background: #fcebeb;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #b5d4f4;
      border-top-color: #1a56a0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .token-box {
      background: #f5f5f3;
      border: 1px solid #e8e8e5;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 12px;
      color: #444;
      word-break: break-all;
      text-align: left;
      margin-bottom: 1rem;
      display: none;
    }

    button {
      height: 38px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #1a56a0;
      border-radius: 8px;
      background: #1a56a0;
      color: #fff;
      cursor: pointer;
      display: none;
    }

    button:hover { background: #154480; }

    .error-detail {
      font-size: 12px;
      color: #a32d2d;
      background: #fcebeb;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 1rem;
      display: none;
      text-align: left;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon spinning" id="icon">
    <div class="spinner" id="spinner"></div>
    <svg id="check-icon" style="display:none" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <svg id="error-icon" style="display:none" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a32d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>

  <h1 id="title">Connecting to MSF...</h1>
  <p id="message">Completing login with Marvel Strike Force. This will only take a moment.</p>

  <div class="token-box" id="token-box"></div>
  <div class="error-detail" id="error-detail"></div>

  <button id="go-btn" onclick="goToApp()">Open the app</button>
</div>

<script>
  function setSuccess(token) {
    document.getElementById("icon").className = "icon success";
    document.getElementById("spinner").style.display = "none";
    document.getElementById("check-icon").style.display = "block";
    document.getElementById("title").textContent = "Connected!";
    document.getElementById("message").textContent = "Your MSF account is linked. You'll be redirected to the app in a moment.";

    const box = document.getElementById("token-box");
    box.textContent = "Token: " + token.substring(0, 12) + "••••••••••••••••";
    box.style.display = "block";

    sessionStorage.setItem("msf_token", token);

    document.getElementById("go-btn").style.display = "inline-block";

    setTimeout(goToApp, 2500);
  }

  function setError(reason) {
    document.getElementById("icon").className = "icon error";
    document.getElementById("spinner").style.display = "none";
    document.getElementById("error-icon").style.display = "block";
    document.getElementById("title").textContent = "Connection failed";
    document.getElementById("message").textContent = "Something went wrong during login. You can go back to the app and try again.";

    const detail = document.getElementById("error-detail");
    detail.textContent = reason || "Unknown error";
    detail.style.display = "block";

    const btn = document.getElementById("go-btn");
    btn.textContent = "Back to app";
    btn.style.display = "inline-block";
  }

  function goToApp() {
    window.location.href = "https://rtatman-dev.github.io/msf-roster/index.html";
  }

  function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const hash   = new URLSearchParams(window.location.hash.replace("#", "?"));

    const error = params.get("error") || hash.get("error");
    if (error) {
      const desc = params.get("error_description") || hash.get("error_description") || error;
      setError(desc);
      return;
    }

    const code  = params.get("code");
    const token = params.get("access_token") || hash.get("access_token");

    if (token) {
      setSuccess(token);
      return;
    }

    if (code) {
      document.getElementById("title").textContent = "Almost there...";
      document.getElementById("message").textContent = "Authorization code received. Exchanging for access token...";
      exchangeCode(code);
      return;
    }

    setError("No authorization code or token found in the redirect URL. Please try logging in again.");
  }

  async function exchangeCode(code) {
    try {
      const res = await fetch("https://hub.marvelstrikeforce.com/oauth/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          grant_type:   "authorization_code",
          code:         code,
          redirect_uri: "https://rtatman-dev.github.io/msf-roster/callback"
        })
      });

      if (!res.ok) throw new Error("Token exchange failed — HTTP " + res.status);

      const data = await res.json();
      if (data.access_token) {
        setSuccess(data.access_token);
      } else {
        throw new Error(data.error_description || data.error || "No token in response");
      }
    } catch (e) {
      setError(e.message);
    }
  }

  handleCallback();
</script>

</body>
</html>
