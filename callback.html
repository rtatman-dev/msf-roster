<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connecting — MSF Roster Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f3; color: #1a1a1a; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border: 1px solid #e8e8e5; border-radius: 14px;
      padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center;
    }
    .icon {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;
    }
    .icon.spinning { background: #e6f1fb; }
    .icon.success  { background: #eaf3de; }
    .icon.error    { background: #fcebeb; }
    .spinner {
      width: 24px; height: 24px; border: 2px solid #b5d4f4;
      border-top-color: #1a56a0; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 0.5rem; }
    p  { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 1rem; }
    .error-detail {
      font-size: 12px; color: #a32d2d; background: #fcebeb;
      border-radius: 8px; padding: 8px 12px; margin-bottom: 1rem;
      text-align: left; display: none;
    }
    button {
      height: 38px; padding: 0 20px; font-size: 14px; font-weight: 500;
      border: 1px solid #1a56a0; border-radius: 8px; background: #1a56a0;
      color: #fff; cursor: pointer; display: none;
    }
    button:hover { background: #154480; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon spinning" id="icon">
    <div class="spinner" id="spinner"></div>
    <svg id="check-icon" style="display:none" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <svg id="error-icon" style="display:none" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a32d2d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </div>
  <h1 id="title">Connecting to MSF...</h1>
  <p id="message">Completing login with Marvel Strike Force. This will only take a moment.</p>
  <div class="error-detail" id="error-detail"></div>
  <button id="go-btn">Open the app</button>
</div>

<script src="callback.js"></script>
</body>
</html>
